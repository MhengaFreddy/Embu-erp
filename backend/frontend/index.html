<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Campus ERP - Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 flex items-center justify-center min-h-screen">
    <div class="w-full max-w-md bg-white rounded-xl shadow-lg p-8">
        <!-- Smart Campus Logo -->
        <div class="flex justify-center mb-4">
            <img src="/assets/logo.png" alt="Smart Campus Logo" class="h-20 w-auto">
        </div>
        <h2 class="text-2xl font-bold text-center text-emerald-700 mb-6">Smart Campus ERP</h2>
        <form id="loginForm">
            <div class="mb-4">
                <label class="block text-sm font-medium">Email</label>
                <input type="email" id="email" required class="w-full px-3 py-2 border rounded-lg focus:ring focus:ring-emerald-300">
            </div>
            <div class="mb-6">
                <label class="block text-sm font-medium">Password</label>
                <input type="password" id="password" required class="w-full px-3 py-2 border rounded-lg focus:ring focus:ring-emerald-300">
            </div>
            <button type="submit" class="w-full bg-emerald-600 text-white py-2 rounded-lg hover:bg-emerald-700 transition">Sign In</button>
        </form>
        <p id="error" class="text-red-500 text-sm mt-3 text-center hidden"></p>
    </div>
    <script>
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            try {
                const res = await fetch('/api/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });
                if (!res.ok) throw new Error('Invalid credentials');
                const data = await res.json();
                localStorage.setItem('access_token', data.access_token);
                localStorage.setItem('refresh_token', data.refresh_token);
                localStorage.setItem('user', JSON.stringify(data.user));

                const role = data.user.role;
                if (role === 'student') {
                    window.location.href = '/student_portal.html';
                } else {
                    window.location.href = '/dashboard.html';
                }
            } catch (err) {
                const errorEl = document.getElementById('error');
                errorEl.textContent = err.message;
                errorEl.classList.remove('hidden');
            }
        });
    </script>
</body>
</html>
