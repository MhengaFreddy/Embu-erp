<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Payroll</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50">
    <div class="flex h-screen">
        <aside id="sidebarContainer" class="w-64 bg-emerald-800 text-white p-4 hidden md:block"></aside>
        <main class="flex-1 p-6 overflow-y-auto">
            <h2 class="text-2xl font-bold mb-4">Payroll</h2>
            <div id="payrollTable" class="bg-white p-4 rounded-lg shadow"></div>
        </main>
    </div>
    <script src="/assets/js/api.js"></script>
    <script src="/assets/js/sidebar.js"></script>
    <script>
        async function loadPayroll() {
            const salaries = await fetchWithAuth('/api/hr/payroll');
            if (salaries.length === 0) { document.getElementById('payrollTable').innerHTML = '<p>No payroll records.</p>'; return; }
            let html = '<table class="w-full table-auto"><thead><tr class="bg-gray-100"><th>Staff ID</th><th>Month</th><th>Basic Pay</th><th>Deductions</th><th>Net Pay</th></tr></thead><tbody>';
            salaries.forEach(s => {
                html += `<tr class="border-b"><td>${s.staff_id}</td><td>${s.month}</td><td>KES ${s.basic_pay}</td><td>KES ${s.deductions}</td><td>KES ${s.net_pay}</td></tr>`;
            });
            html += '</tbody></table>';
            document.getElementById('payrollTable').innerHTML = html;
        }
        window.addEventListener('DOMContentLoaded', loadPayroll);
    </script>
</body>
</html>
